name: Feature Request
description: Suggest a focused RadarWise improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow, region, provider, or setup issue this would improve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like RadarWise to do?
    validations:
      required: true
  - type: input
    id: radarwise_version
    attributes:
      label: RadarWise version
      placeholder: v0.5.0
    validations:
      required: false
  - type: input
    id: region
    attributes:
      label: Region/provider
      placeholder: US NOAA / Canada / UK / Australia / RainViewer / etc.
    validations:
      required: false
  - type: textarea
    id: regional_support
    attributes:
      label: Regional support details
      description: If this is for a country or provider RadarWise does not handle well yet, include the local weather integration, radar source, alert/warning source, and an example of what users in your area expect.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, examples, or related apps/features are welcome.
    validations:
      required: false
